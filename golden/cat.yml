in_source: |
  .data
  one: .word 1
  newline: .word 10
  done: .word 0
  char: .word 0

  .text
  .entry main
  .interrupt input_irq
  main:
      ei
  wait_input:
      ld done
      jz wait_input
      halt

  input_irq:
      ld %in
      st char
      cmp newline
      jz input_done
      ld char
      st %out
      iret
  input_done:
      ld one
      st done
      iret

in_stdin: |
  - tick: 1
    value: "c"
  - tick: 20
    value: "a"
  - tick: 40
    value: "t"
  - tick: 60
    value: "\n"
in_trace_limit: 89
in_max_ticks: 100000
out_code: !!binary |
  Q1NBNAAAAAAAAAAEAAAADgAAAAQdAAAAAwAAAhIAAAEBAAAAAwD/AAQAAAMPAAABEgAACwMAAAME
  AP8BHAAAAAMAAAAEAAACHAAAAAAAAAEAAAAKAAAAAAAAAAA=
out_code_hex: |
  0000 - 1D000000 - ei
  0001 - 03000002 - ld done
  0002 - 12000001 - jz wait_input
  0003 - 01000000 - halt
  0004 - 0300FF00 - ld %in
  0005 - 04000003 - st char
  0006 - 0F000001 - cmp newline
  0007 - 1200000B - jz input_done
  0008 - 03000003 - ld char
  0009 - 0400FF01 - st %out
  0010 - 1C000000 - iret
  0011 - 03000000 - ld one
  0012 - 04000002 - st done
  0013 - 1C000000 - iret
out_stdout: |
  cat
  ticks: 89
