name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: python -m pip install --upgrade pip ruff PyYAML pytest pytest-golden

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Run golden tests
        run: python -m pytest -v
